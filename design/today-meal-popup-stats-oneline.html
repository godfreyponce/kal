<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meal popup stats — one-line stacked chips (round 3)</title>
<style>
  :root {
    --canvas: #f7f6f3;
    --surface-2: #f0efeb;
    --ink: #1f2421;
    --ink-soft: #2f3437;
    --muted: #787774;
    --faint: #9b9a96;
    --border: #e6e4df;
    --protein: #9f2f2d;
    --carbs: #8a6a1f;
    --fat: #1f6c9f;
    --green-bg: #e6efe5;
    --green-tx: #346538;
    --font-sans-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    --font-serif: "Newsreader", Georgia, serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #b9b7b2;
    color: var(--ink);
    font-family: var(--font-sans-stack);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 64px;
  }
  .page-head { max-width: 1320px; margin: 0 auto 28px; color: #f4f3f0; }
  .page-head h1 { font-family: var(--font-serif); font-weight: 500; font-size: 24px; letter-spacing: -0.02em; }
  .page-head p { font-family: var(--font-mono); font-size: 11.5px; opacity: 0.85; margin-top: 4px; }
  .row {
    display: flex; flex-wrap: wrap; gap: 36px;
    justify-content: center; align-items: flex-start;
    max-width: 1320px; margin: 0 auto;
  }
  .variant { width: 396px; max-width: 100%; }
  .variant.narrow { width: 350px; } /* iPhone-width proof: 390 screen - 2×20 overlay padding */
  .vlabel {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #f4f3f0; margin-bottom: 4px;
  }
  .vdesc {
    font-family: var(--font-mono); font-size: 11px; color: #eceae6;
    opacity: 0.85; margin-bottom: 12px; min-height: 3.2em;
  }

  /* ---- the popup card, verbatim from globals.css ---- */
  .mpop-card {
    position: relative; width: 100%;
    background: var(--canvas);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px 22px;
    box-shadow: 0 20px 60px rgba(31, 36, 33, 0.22);
  }
  .mpop-head { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; }
  .mpop-title {
    font-family: var(--font-serif); font-size: 24px; font-weight: 500;
    letter-spacing: -0.02em; flex: 1; min-width: 0; line-height: 1.2;
  }
  .mpop-kcal { font-family: var(--font-mono); font-size: 13px; color: var(--muted); white-space: nowrap; }
  .mpop-x {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 9999px;
    border: 0; background: var(--surface-2); color: var(--muted);
    font-size: 13px; line-height: 1; cursor: pointer;
  }
  .mpop-hint { font-family: var(--font-mono); font-size: 11px; color: var(--faint); margin-bottom: 12px; }
  .mpop-item {
    width: 100%; display: flex; align-items: baseline; gap: 10px;
    padding: 9px 0; border: 0; border-bottom: 1px solid var(--border);
    background: none; font: inherit; text-align: left; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mpop-item.open, .mpop-item.last, .mpop-serv.last { border-bottom-color: transparent; }
  .mi-name { flex: 1; min-width: 0; font-size: 14.5px; color: var(--ink-soft); }
  .mi-amt { font-family: var(--font-mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .mi-kcal { font-family: var(--font-mono); font-size: 12px; color: var(--faint); width: 42px; text-align: right; }
  .mi-caret { color: var(--faint); font-size: 11px; align-self: center; transition: transform 0.18s; display: inline-block; }
  .mpop-item.open .mi-caret { transform: rotate(90deg); }
  .mpop-serv { padding: 5px 0 12px; border-bottom: 1px solid var(--border); }
  .mpop-serv.hidden { display: none; }
  .mpop-totals {
    display: flex; gap: 18px; padding-top: 13px; margin-top: 4px;
    border-top: 1px solid var(--ink);
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .mpop-totals b { color: var(--ink); font-weight: 500; }
  .mpop-totals .p b { color: var(--protein); }
  .mpop-totals .c b { color: var(--carbs); }
  .mpop-totals .f b { color: var(--fat); }
  .mpop-btn {
    width: 100%; margin-top: 18px; padding: 12px; border-radius: 12px;
    border: 1px solid var(--green-bg); background: var(--green-bg); color: var(--green-tx);
    font-family: var(--font-sans-stack); font-size: 14.5px; cursor: pointer;
  }

  /* ---- shared chip colors ---- */
  .cell b { font-weight: 500; }
  .cell.p { background: rgba(159, 47, 45, 0.09); color: var(--protein); }
  .cell.c { background: rgba(138, 106, 31, 0.10); color: var(--carbs); }
  .cell.f { background: rgba(31, 108, 159, 0.09); color: var(--fat); }
  .cell.k { background: var(--surface-2); color: var(--ink); }

  /* =====================================================================
     D1 — equal-width pills
     Four pills share the row width (grid, no wrap possible). Full labels
     kept; per-serving tiny line inside each pill, centered.
     ===================================================================== */
  .d1 .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .d1 .cell {
    font-family: var(--font-mono);
    border-radius: 12px; padding: 5px 2px 4px;
    text-align: center; min-width: 0;
  }
  .d1 .v { display: block; font-size: 11.5px; line-height: 1.35; white-space: nowrap; }
  .d1 .s { display: block; font-size: 9px; line-height: 1.3; opacity: 0.62; white-space: nowrap; }

  /* =====================================================================
     D2 — short labels
     Chips keep their natural pill width but labels drop to P / C / F
     (same letters as the totals row), so all four always fit with room
     for bigger numbers.
     ===================================================================== */
  .d2 .strip { display: flex; gap: 6px; }
  .d2 .cell {
    font-family: var(--font-mono);
    border-radius: 13px; padding: 5px 11px 4px;
    text-align: center; white-space: nowrap;
  }
  .d2 .v { display: block; font-size: 12.5px; line-height: 1.35; }
  .d2 .s { display: block; font-size: 9.5px; line-height: 1.3; opacity: 0.62; }

  /* =====================================================================
     D3 — one segmented strip
     A single rounded bar split into four tinted cells — reads as ONE
     object, can't wrap, echoes the segmented macro bars on Today.
     ===================================================================== */
  .d3 .strip {
    display: flex; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .d3 .cell {
    flex: 1; min-width: 0;
    font-family: var(--font-mono);
    padding: 5px 2px 4px; text-align: center;
  }
  .d3 .cell + .cell { border-left: 1px solid rgba(31, 36, 33, 0.06); }
  .d3 .v { display: block; font-size: 11.5px; line-height: 1.35; white-space: nowrap; }
  .d3 .s { display: block; font-size: 9px; line-height: 1.3; opacity: 0.62; white-space: nowrap; }
</style>
</head>
<body>

<div class="page-head">
  <h1>Stacked chips, one line — round 3</h1>
  <p>the C3 you picked, guaranteed never to wrap. middle card is iPhone-width (350px) to prove the fit. egg &amp; peanut butter start open</p>
</div>

<div class="row" id="row"></div>

<script>
const FOODS = [
  { name: "Egg, large",        amt: "4 egg",    kcal: 280, serv: "egg",    s: [70, "6g", "0.5g", "5g"],     y: [280, "24g", "2g", "20g"],    open: true  },
  { name: "Whole wheat bread", amt: "4 slice",  kcal: 240, serv: "slice",  s: [60, "3g", "11g", "1g"],      y: [240, "12g", "44g", "4g"],    open: false },
  { name: "Peanut butter",     amt: "2 tbsp",   kcal: 190, serv: "tbsp",   s: [95, "4g", "3.5g", "8g"],     y: [190, "8g", "7g", "16g"],     open: true  },
  { name: "Banana, medium",    amt: "1 banana", kcal: 105, serv: "banana", s: [105, "1.3g", "27g", "0.4g"], y: [105, "1.3g", "27g", "0.4g"], open: false },
];

const cells = (f, labels) => `
  <span class="cell k"><span class="v"><b>${f.y[0]}</b> kcal</span><span class="s">${f.s[0]} / ${f.serv}</span></span>
  <span class="cell p"><span class="v"><b>${f.y[1]}</b> ${labels[0]}</span><span class="s">${f.s[1]} / ${f.serv}</span></span>
  <span class="cell c"><span class="v"><b>${f.y[2]}</b> ${labels[1]}</span><span class="s">${f.s[2]} / ${f.serv}</span></span>
  <span class="cell f"><span class="v"><b>${f.y[3]}</b> ${labels[2]}</span><span class="s">${f.s[3]} / ${f.serv}</span></span>`;

const EXPANSIONS = {
  d1: (f) => `<div class="grid">${cells(f, ["protein", "carbs", "fat"])}</div>`,
  d2: (f) => `<div class="strip">${cells(f, ["P", "C", "F"])}</div>`,
  d3: (f) => `<div class="strip">${cells(f, ["protein", "carbs", "fat"])}</div>`,
};

const VARIANTS = [
  { key: "d1", label: "D1 — equal-width pills", desc: "four pills share the row (grid, can't wrap); full labels kept", narrow: false },
  { key: "d2", label: "D2 — short labels (iPhone width)", desc: "natural pill widths, labels drop to P / C / F like the totals row; bigger numbers", narrow: true },
  { key: "d3", label: "D3 — one segmented strip", desc: "a single rounded bar split into four tinted cells — reads as one object, echoes Today's macro bars", narrow: false },
];

function card(v) {
  const items = FOODS.map((f, i) => {
    const last = i === FOODS.length - 1 ? " last" : "";
    return `
      <button type="button" class="mpop-item${f.open ? " open" : ""}${last}" onclick="toggle(this)">
        <span class="mi-name">${f.name}</span>
        <span class="mi-amt">${f.amt}</span>
        <span class="mi-kcal">${f.kcal}</span>
        <span class="mi-caret">›</span>
      </button>
      <div class="mpop-serv${last}${f.open ? "" : " hidden"}">${EXPANSIONS[v.key](f)}</div>`;
  }).join("");
  return `
    <div class="variant ${v.key}${v.narrow ? " narrow" : ""}">
      <div class="vlabel">${v.label}</div>
      <div class="vdesc">${v.desc}</div>
      <div class="mpop-card">
        <div class="mpop-head">
          <span class="mpop-title">Breakfast</span>
          <span class="mpop-kcal">815 kcal</span>
          <button type="button" class="mpop-x">✕</button>
        </div>
        <div class="mpop-hint">morning — tap a food for one serving</div>
        ${items}
        <div class="mpop-totals">
          <span><b>815</b> kcal</span>
          <span class="p"><b>48g</b> P</span>
          <span class="c"><b>80g</b> C</span>
          <span class="f"><b>40g</b> F</span>
        </div>
        <button type="button" class="mpop-btn">Eaten ✓ — tap to undo</button>
      </div>
    </div>`;
}

document.getElementById("row").innerHTML = VARIANTS.map(card).join("");

function toggle(btn) {
  const serv = btn.nextElementSibling;
  const open = serv.classList.toggle("hidden");
  btn.classList.toggle("open", !open);
}
</script>

</body>
</html>
