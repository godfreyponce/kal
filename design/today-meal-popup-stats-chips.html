<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meal popup stats — chip refinements (round 2)</title>
<style>
  :root {
    --canvas: #f7f6f3;
    --surface-2: #f0efeb;
    --ink: #1f2421;
    --ink-soft: #2f3437;
    --muted: #787774;
    --faint: #9b9a96;
    --border: #e6e4df;
    --protein: #9f2f2d;
    --carbs: #8a6a1f;
    --fat: #1f6c9f;
    --green-bg: #e6efe5;
    --green-tx: #346538;
    --font-sans-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    --font-serif: "Newsreader", Georgia, serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #b9b7b2;
    color: var(--ink);
    font-family: var(--font-sans-stack);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 64px;
  }
  .page-head { max-width: 1320px; margin: 0 auto 28px; color: #f4f3f0; }
  .page-head h1 { font-family: var(--font-serif); font-weight: 500; font-size: 24px; letter-spacing: -0.02em; }
  .page-head p { font-family: var(--font-mono); font-size: 11.5px; opacity: 0.85; margin-top: 4px; }
  .row {
    display: flex; flex-wrap: wrap; gap: 36px;
    justify-content: center; align-items: flex-start;
    max-width: 1320px; margin: 0 auto;
  }
  .variant { width: 396px; max-width: 100%; }
  .vlabel {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #f4f3f0; margin-bottom: 4px;
  }
  .vdesc {
    font-family: var(--font-mono); font-size: 11px; color: #eceae6;
    opacity: 0.85; margin-bottom: 12px; min-height: 3.2em;
  }

  /* ---- the popup card, verbatim from globals.css ---- */
  .mpop-card {
    position: relative; width: 100%;
    background: var(--canvas);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px 22px;
    box-shadow: 0 20px 60px rgba(31, 36, 33, 0.22);
  }
  .mpop-head { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; }
  .mpop-title {
    font-family: var(--font-serif); font-size: 24px; font-weight: 500;
    letter-spacing: -0.02em; flex: 1; min-width: 0; line-height: 1.2;
  }
  .mpop-kcal { font-family: var(--font-mono); font-size: 13px; color: var(--muted); white-space: nowrap; }
  .mpop-x {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 9999px;
    border: 0; background: var(--surface-2); color: var(--muted);
    font-size: 13px; line-height: 1; cursor: pointer;
  }
  .mpop-hint { font-family: var(--font-mono); font-size: 11px; color: var(--faint); margin-bottom: 12px; }
  .mpop-item {
    width: 100%; display: flex; align-items: baseline; gap: 10px;
    padding: 9px 0; border: 0; border-bottom: 1px solid var(--border);
    background: none; font: inherit; text-align: left; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mpop-item.open, .mpop-item.last, .mpop-serv.last { border-bottom-color: transparent; }
  .mi-name { flex: 1; min-width: 0; font-size: 14.5px; color: var(--ink-soft); }
  .mi-amt { font-family: var(--font-mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .mi-kcal { font-family: var(--font-mono); font-size: 12px; color: var(--faint); width: 42px; text-align: right; }
  .mi-caret { color: var(--faint); font-size: 11px; align-self: center; transition: transform 0.18s; display: inline-block; }
  .mpop-item.open .mi-caret { transform: rotate(90deg); }
  .mpop-serv { padding: 5px 0 12px; border-bottom: 1px solid var(--border); }
  .mpop-serv.hidden { display: none; }
  .mpop-totals {
    display: flex; gap: 18px; padding-top: 13px; margin-top: 4px;
    border-top: 1px solid var(--ink);
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .mpop-totals b { color: var(--ink); font-weight: 500; }
  .mpop-totals .p b { color: var(--protein); }
  .mpop-totals .c b { color: var(--carbs); }
  .mpop-totals .f b { color: var(--fat); }
  .mpop-btn {
    width: 100%; margin-top: 18px; padding: 12px; border-radius: 12px;
    border: 1px solid var(--green-bg); background: var(--green-bg); color: var(--green-tx);
    font-family: var(--font-sans-stack); font-size: 14.5px; cursor: pointer;
  }

  /* ---- shared chip look (the piece you picked) ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: var(--font-mono); font-size: 11.5px;
    padding: 3px 9px; border-radius: 9999px;
    background: var(--surface-2); color: var(--ink);
    white-space: nowrap;
  }
  .chip b { font-weight: 500; }
  .chip.p { background: rgba(159, 47, 45, 0.09); color: var(--protein); }
  .chip.c { background: rgba(138, 106, 31, 0.10); color: var(--carbs); }
  .chip.f { background: rgba(31, 108, 159, 0.09); color: var(--fat); }

  /* =====================================================================
     C1 — footnote  (round 1's C, as picked)
     Chips for your amount; 1-serving basis as one faint mono line below.
     ===================================================================== */
  .c1 .chips { padding-bottom: 8px; }
  .c1 .basis { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); }

  /* =====================================================================
     C2 — ghost serving chips
     Second row of smaller, outlined chips for the 1-serving basis — the
     two rows mirror each other, so serving vs yours compares pill-to-pill.
     ===================================================================== */
  .c2 .chips { padding-bottom: 7px; }
  .c2 .srow { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .c2 .slabel { font-family: var(--font-mono); font-size: 10px; color: var(--faint); margin-right: 2px; }
  .c2 .ghost {
    font-family: var(--font-mono); font-size: 10px;
    padding: 1.5px 7px; border-radius: 9999px;
    background: transparent; border: 1px solid var(--border);
    color: var(--faint); white-space: nowrap;
  }
  .c2 .ghost.p { color: rgba(159, 47, 45, 0.6); }
  .c2 .ghost.c { color: rgba(138, 106, 31, 0.6); }
  .c2 .ghost.f { color: rgba(31, 108, 159, 0.6); }

  /* =====================================================================
     C3 — stacked chips
     One row only: each pill carries your value on top and its 1-serving
     basis as a tiny second line inside the same pill. No footnote at all.
     ===================================================================== */
  .c3 .chip { padding: 5px 11px 4px; border-radius: 13px; text-align: center; }
  .c3 .chip .v { display: block; font-size: 12px; line-height: 1.35; }
  .c3 .chip .s { display: block; font-size: 9px; line-height: 1.3; opacity: 0.62; }
</style>
</head>
<body>

<div class="page-head">
  <h1>Chips — round 2</h1>
  <p>same chips you picked; the three differ in how the 1-serving basis tags along. egg &amp; peanut butter start open</p>
</div>

<div class="row" id="row"></div>

<script>
const FOODS = [
  { name: "Egg, large",        amt: "4 egg",    kcal: 280, serv: "1 egg",    s: [70, "6g", "0.5g", "5g"],     y: [280, "24g", "2g", "20g"],    open: true  },
  { name: "Whole wheat bread", amt: "4 slice",  kcal: 240, serv: "1 slice",  s: [60, "3g", "11g", "1g"],      y: [240, "12g", "44g", "4g"],    open: false },
  { name: "Peanut butter",     amt: "2 tbsp",   kcal: 190, serv: "1 tbsp",   s: [95, "4g", "3.5g", "8g"],     y: [190, "8g", "7g", "16g"],     open: true  },
  { name: "Banana, medium",    amt: "1 banana", kcal: 105, serv: "1 banana", s: [105, "1.3g", "27g", "0.4g"], y: [105, "1.3g", "27g", "0.4g"], open: false },
];

const yourChips = (f) => `
  <div class="chips">
    <span class="chip"><b>${f.y[0]}</b> kcal</span>
    <span class="chip p"><b>${f.y[1]}</b> protein</span>
    <span class="chip c"><b>${f.y[2]}</b> carbs</span>
    <span class="chip f"><b>${f.y[3]}</b> fat</span>
  </div>`;

const EXPANSIONS = {
  c1: (f) => `
    ${yourChips(f)}
    <div class="basis">1 serving (${f.serv}) = ${f.s[0]} kcal, ${f.s[1]} P, ${f.s[2]} C, ${f.s[3]} F</div>`,
  c2: (f) => `
    ${yourChips(f)}
    <div class="srow">
      <span class="slabel">1 serving (${f.serv})</span>
      <span class="ghost">${f.s[0]} kcal</span>
      <span class="ghost p">${f.s[1]} protein</span>
      <span class="ghost c">${f.s[2]} carbs</span>
      <span class="ghost f">${f.s[3]} fat</span>
    </div>`,
  c3: (f) => `
    <div class="chips">
      <span class="chip"><span class="v"><b>${f.y[0]}</b> kcal</span><span class="s">${f.s[0]} / ${f.serv.replace("1 ", "")}</span></span>
      <span class="chip p"><span class="v"><b>${f.y[1]}</b> protein</span><span class="s">${f.s[1]} / ${f.serv.replace("1 ", "")}</span></span>
      <span class="chip c"><span class="v"><b>${f.y[2]}</b> carbs</span><span class="s">${f.s[2]} / ${f.serv.replace("1 ", "")}</span></span>
      <span class="chip f"><span class="v"><b>${f.y[3]}</b> fat</span><span class="s">${f.s[3]} / ${f.serv.replace("1 ", "")}</span></span>
    </div>`,
};

const VARIANTS = [
  { key: "c1", label: "C1 — footnote", desc: "as picked in round 1: your chips + one faint 1-serving line" },
  { key: "c2", label: "C2 — ghost serving chips", desc: "serving basis as smaller outlined pills — mirrors the row above, compares pill-to-pill" },
  { key: "c3", label: "C3 — stacked chips", desc: "one row: per-serving lives inside each pill as a tiny second line; no footnote" },
];

function card(v) {
  const items = FOODS.map((f, i) => {
    const last = i === FOODS.length - 1 ? " last" : "";
    return `
      <button type="button" class="mpop-item${f.open ? " open" : ""}${last}" onclick="toggle(this)">
        <span class="mi-name">${f.name}</span>
        <span class="mi-amt">${f.amt}</span>
        <span class="mi-kcal">${f.kcal}</span>
        <span class="mi-caret">›</span>
      </button>
      <div class="mpop-serv${last}${f.open ? "" : " hidden"}">${EXPANSIONS[v.key](f)}</div>`;
  }).join("");
  return `
    <div class="variant ${v.key}">
      <div class="vlabel">${v.label}</div>
      <div class="vdesc">${v.desc}</div>
      <div class="mpop-card">
        <div class="mpop-head">
          <span class="mpop-title">Breakfast</span>
          <span class="mpop-kcal">815 kcal</span>
          <button type="button" class="mpop-x">✕</button>
        </div>
        <div class="mpop-hint">morning — tap a food for one serving</div>
        ${items}
        <div class="mpop-totals">
          <span><b>815</b> kcal</span>
          <span class="p"><b>48g</b> P</span>
          <span class="c"><b>80g</b> C</span>
          <span class="f"><b>40g</b> F</span>
        </div>
        <button type="button" class="mpop-btn">Eaten ✓ — tap to undo</button>
      </div>
    </div>`;
}

document.getElementById("row").innerHTML = VARIANTS.map(card).join("");

function toggle(btn) {
  const serv = btn.nextElementSibling;
  const open = serv.classList.toggle("hidden");
  btn.classList.toggle("open", !open);
}
</script>

</body>
</html>
