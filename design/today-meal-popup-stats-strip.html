<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meal popup stats — strip riffs (round 4)</title>
<style>
  :root {
    --canvas: #f7f6f3;
    --surface-2: #f0efeb;
    --ink: #1f2421;
    --ink-soft: #2f3437;
    --muted: #787774;
    --faint: #9b9a96;
    --border: #e6e4df;
    --protein: #9f2f2d;
    --carbs: #8a6a1f;
    --fat: #1f6c9f;
    --green-bg: #e6efe5;
    --green-tx: #346538;
    --font-sans-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    --font-serif: "Newsreader", Georgia, serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #b9b7b2;
    color: var(--ink);
    font-family: var(--font-sans-stack);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 32px 20px 64px;
  }
  .page-head { max-width: 1320px; margin: 0 auto 28px; color: #f4f3f0; }
  .page-head h1 { font-family: var(--font-serif); font-weight: 500; font-size: 24px; letter-spacing: -0.02em; }
  .page-head p { font-family: var(--font-mono); font-size: 11.5px; opacity: 0.85; margin-top: 4px; }
  .row {
    display: flex; flex-wrap: wrap; gap: 36px;
    justify-content: center; align-items: flex-start;
    max-width: 1320px; margin: 0 auto;
  }
  .variant { width: 396px; max-width: 100%; }
  .vlabel {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #f4f3f0; margin-bottom: 4px;
  }
  .vdesc {
    font-family: var(--font-mono); font-size: 11px; color: #eceae6;
    opacity: 0.85; margin-bottom: 12px; min-height: 3.2em;
  }

  /* ---- the popup card, verbatim from globals.css ---- */
  .mpop-card {
    position: relative; width: 100%;
    background: var(--canvas);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px 22px;
    box-shadow: 0 20px 60px rgba(31, 36, 33, 0.22);
  }
  .mpop-head { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; }
  .mpop-title {
    font-family: var(--font-serif); font-size: 24px; font-weight: 500;
    letter-spacing: -0.02em; flex: 1; min-width: 0; line-height: 1.2;
  }
  .mpop-kcal { font-family: var(--font-mono); font-size: 13px; color: var(--muted); white-space: nowrap; }
  .mpop-x {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 9999px;
    border: 0; background: var(--surface-2); color: var(--muted);
    font-size: 13px; line-height: 1; cursor: pointer;
  }
  .mpop-hint { font-family: var(--font-mono); font-size: 11px; color: var(--faint); margin-bottom: 12px; }
  .mpop-item {
    width: 100%; display: flex; align-items: baseline; gap: 10px;
    padding: 9px 0; border: 0; border-bottom: 1px solid var(--border);
    background: none; font: inherit; text-align: left; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mpop-item.open, .mpop-item.last, .mpop-serv.last { border-bottom-color: transparent; }
  .mi-name { flex: 1; min-width: 0; font-size: 14.5px; color: var(--ink-soft); }
  .mi-amt { font-family: var(--font-mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .mi-kcal { font-family: var(--font-mono); font-size: 12px; color: var(--faint); width: 42px; text-align: right; }
  .mi-caret { color: var(--faint); font-size: 11px; align-self: center; transition: transform 0.18s; display: inline-block; }
  .mpop-item.open .mi-caret { transform: rotate(90deg); }
  .mpop-serv { padding: 5px 0 12px; border-bottom: 1px solid var(--border); }
  .mpop-serv.hidden { display: none; }
  .mpop-totals {
    display: flex; gap: 18px; padding-top: 13px; margin-top: 4px;
    border-top: 1px solid var(--ink);
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  }
  .mpop-totals b { color: var(--ink); font-weight: 500; }
  .mpop-totals .p b { color: var(--protein); }
  .mpop-totals .c b { color: var(--carbs); }
  .mpop-totals .f b { color: var(--fat); }
  .mpop-btn {
    width: 100%; margin-top: 18px; padding: 12px; border-radius: 12px;
    border: 1px solid var(--green-bg); background: var(--green-bg); color: var(--green-tx);
    font-family: var(--font-sans-stack); font-size: 14.5px; cursor: pointer;
  }

  /* =====================================================================
     E1 — flat tints, no border
     D3 minus the outline: the four tinted cells fuse into one soft shape,
     no hairline dividers — the tint changes mark the cells. Calmer edges.
     ===================================================================== */
  .e1 .strip { display: flex; border-radius: 12px; overflow: hidden; }
  .e1 .cell { flex: 1; min-width: 0; font-family: var(--font-mono); padding: 6px 2px 5px; text-align: center; }
  .e1 .cell b { font-weight: 500; }
  .e1 .cell.k { background: var(--surface-2); color: var(--ink); }
  .e1 .cell.p { background: rgba(159, 47, 45, 0.09); color: var(--protein); }
  .e1 .cell.c { background: rgba(138, 106, 31, 0.10); color: var(--carbs); }
  .e1 .cell.f { background: rgba(31, 108, 159, 0.09); color: var(--fat); }
  .e1 .v { display: block; font-size: 11.5px; line-height: 1.35; white-space: nowrap; }
  .e1 .s { display: block; font-size: 9px; line-height: 1.3; opacity: 0.62; white-space: nowrap; }

  /* =====================================================================
     E2 — quiet strip, colored numbers
     One plain surface-2 strip (no pastel tints at all) — color moves to
     the NUMBERS only, like the totals row. The most warm-monochrome one.
     ===================================================================== */
  .e2 .strip { display: flex; background: var(--surface-2); border-radius: 12px; }
  .e2 .cell { flex: 1; min-width: 0; font-family: var(--font-mono); padding: 6px 2px 5px; text-align: center; }
  .e2 .cell + .cell { border-left: 1px solid rgba(31, 36, 33, 0.06); }
  .e2 .cell b { font-weight: 500; color: var(--ink); }
  .e2 .cell.p b { color: var(--protein); }
  .e2 .cell.c b { color: var(--carbs); }
  .e2 .cell.f b { color: var(--fat); }
  .e2 .v { display: block; font-size: 11.5px; line-height: 1.35; white-space: nowrap; color: var(--muted); }
  .e2 .s { display: block; font-size: 9px; line-height: 1.3; color: var(--faint); white-space: nowrap; }

  /* =====================================================================
     E3 — no box at all
     Drop the container entirely: four open columns with tiny uppercase
     labels on top (like the app's kickers), colored values, per-serving
     under. Hairline dividers between columns. Airy, editorial.
     ===================================================================== */
  .e3 .strip { display: flex; padding: 2px 0 1px; }
  .e3 .cell { flex: 1; min-width: 0; font-family: var(--font-mono); text-align: center; }
  .e3 .cell + .cell { border-left: 1px solid var(--border); }
  .e3 .lab {
    display: block; font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--faint); line-height: 1.5;
  }
  .e3 .v { display: block; font-size: 12.5px; line-height: 1.3; white-space: nowrap; font-weight: 500; color: var(--ink); }
  .e3 .cell.p .v { color: var(--protein); }
  .e3 .cell.c .v { color: var(--carbs); }
  .e3 .cell.f .v { color: var(--fat); }
  .e3 .s { display: block; font-size: 9px; line-height: 1.5; color: var(--faint); white-space: nowrap; }
</style>
</head>
<body>

<div class="page-head">
  <h1>Off D3 — round 4</h1>
  <p>each one removes a different thing that might be the iffy: the outline, the pastel tints, or the box itself. egg &amp; peanut butter start open</p>
</div>

<div class="row" id="row"></div>

<script>
const FOODS = [
  { name: "Egg, large",        amt: "4 egg",    kcal: 280, serv: "egg",    s: [70, "6g", "0.5g", "5g"],     y: [280, "24g", "2g", "20g"],    open: true  },
  { name: "Whole wheat bread", amt: "4 slice",  kcal: 240, serv: "slice",  s: [60, "3g", "11g", "1g"],      y: [240, "12g", "44g", "4g"],    open: false },
  { name: "Peanut butter",     amt: "2 tbsp",   kcal: 190, serv: "tbsp",   s: [95, "4g", "3.5g", "8g"],     y: [190, "8g", "7g", "16g"],     open: true  },
  { name: "Banana, medium",    amt: "1 banana", kcal: 105, serv: "banana", s: [105, "1.3g", "27g", "0.4g"], y: [105, "1.3g", "27g", "0.4g"], open: false },
];

const stripCells = (f) => `
  <span class="cell k"><span class="v"><b>${f.y[0]}</b> kcal</span><span class="s">${f.s[0]} / ${f.serv}</span></span>
  <span class="cell p"><span class="v"><b>${f.y[1]}</b> protein</span><span class="s">${f.s[1]} / ${f.serv}</span></span>
  <span class="cell c"><span class="v"><b>${f.y[2]}</b> carbs</span><span class="s">${f.s[2]} / ${f.serv}</span></span>
  <span class="cell f"><span class="v"><b>${f.y[3]}</b> fat</span><span class="s">${f.s[3]} / ${f.serv}</span></span>`;

const EXPANSIONS = {
  e1: (f) => `<div class="strip">${stripCells(f)}</div>`,
  e2: (f) => `<div class="strip">${stripCells(f)}</div>`,
  e3: (f) => `
    <div class="strip">
      <span class="cell k"><span class="lab">kcal</span><span class="v">${f.y[0]}</span><span class="s">${f.s[0]} / ${f.serv}</span></span>
      <span class="cell p"><span class="lab">protein</span><span class="v">${f.y[1]}</span><span class="s">${f.s[1]} / ${f.serv}</span></span>
      <span class="cell c"><span class="lab">carbs</span><span class="v">${f.y[2]}</span><span class="s">${f.s[2]} / ${f.serv}</span></span>
      <span class="cell f"><span class="lab">fat</span><span class="v">${f.y[3]}</span><span class="s">${f.s[3]} / ${f.serv}</span></span>
    </div>`,
};

const VARIANTS = [
  { key: "e1", label: "E1 — flat tints, no border", desc: "D3 minus the outline + dividers; the tints alone mark the cells. calmer edges" },
  { key: "e2", label: "E2 — quiet strip", desc: "no pastel tints — one plain strip, color moves to the numbers only, like the totals row" },
  { key: "e3", label: "E3 — no box at all", desc: "open columns with tiny uppercase labels on top, hairline dividers. airy, editorial" },
];

function card(v) {
  const items = FOODS.map((f, i) => {
    const last = i === FOODS.length - 1 ? " last" : "";
    return `
      <button type="button" class="mpop-item${f.open ? " open" : ""}${last}" onclick="toggle(this)">
        <span class="mi-name">${f.name}</span>
        <span class="mi-amt">${f.amt}</span>
        <span class="mi-kcal">${f.kcal}</span>
        <span class="mi-caret">›</span>
      </button>
      <div class="mpop-serv${last}${f.open ? "" : " hidden"}">${EXPANSIONS[v.key](f)}</div>`;
  }).join("");
  return `
    <div class="variant ${v.key}">
      <div class="vlabel">${v.label}</div>
      <div class="vdesc">${v.desc}</div>
      <div class="mpop-card">
        <div class="mpop-head">
          <span class="mpop-title">Breakfast</span>
          <span class="mpop-kcal">815 kcal</span>
          <button type="button" class="mpop-x">✕</button>
        </div>
        <div class="mpop-hint">morning — tap a food for one serving</div>
        ${items}
        <div class="mpop-totals">
          <span><b>815</b> kcal</span>
          <span class="p"><b>48g</b> P</span>
          <span class="c"><b>80g</b> C</span>
          <span class="f"><b>40g</b> F</span>
        </div>
        <button type="button" class="mpop-btn">Eaten ✓ — tap to undo</button>
      </div>
    </div>`;
}

document.getElementById("row").innerHTML = VARIANTS.map(card).join("");

function toggle(btn) {
  const serv = btn.nextElementSibling;
  const open = serv.classList.toggle("hidden");
  btn.classList.toggle("open", !open);
}
</script>

</body>
</html>
